<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniTools - 在线工具集合</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1 class="title">MiniTools</h1>
            <p class="desc">实用的在线工具集合，无需安装，直接在浏览器中使用</p>
        </div>
    </header>

    <div class="container">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="输入关键字搜索工具...">
        </div>

        <section class="category">
            <div class="category-header">
                <div class="category-tag">常用工具</div>
            </div>
            <div class="tools-list">
                <a href="large-number-calculator/index.html" class="tool-item" data-keywords="计算器 大数 数学">
                    <span>大数计算器</span>
                </a>
                <a href="text-to-image/index.html" class="tool-item" data-keywords="文字 图片 生成">
                    <span>文字转图片</span>
                </a>
                <a href="excel-to-csv/index.html" class="tool-item" data-keywords="excel csv 表格 转换">
                    <span>Excel转CSV</span>
                </a>
                <a href="image-to-pdf/index.html" class="tool-item" data-keywords="图片 pdf 合并">
                    <span>图片转PDF</span>
                </a>
            </div>
        </section>

        <section class="category">
            <div class="category-header">
                <div class="category-tag">图片工具</div>
            </div>
            <div class="tools-list">
                <a href="image-compressor/index.html" class="tool-item" data-keywords="图片 压缩 缩小">
                    <span>图片压缩</span>
                </a>
                <a href="image-to-pdf/index.html" class="tool-item" data-keywords="图片 pdf 合并">
                    <span>图片转PDF</span>
                </a>
                <a href="pdf-to-image/index.html" class="tool-item" data-keywords="pdf 图片 转换">
                    <span>PDF转图片</span>
                </a>
                <a href="picture-quality-enhancement/index.html" class="tool-item" data-keywords="图片 质量 增强 调整">
                    <span>图片质量增强</span>
                </a>
                <a href="color-picker/index.html" class="tool-item" data-keywords="取色 颜色 吸管">
                    <span>图片取色器</span>
                </a>
                <a href="ico-icon-conversion/index.html" class="tool-item" data-keywords="ico png 图标">
                    <span>PNG转ICO</span>
                </a>
            </div>
        </section>

        <section class="category">
            <div class="category-header">
                <div class="category-tag">媒体工具</div>
            </div>
            <div class="tools-list">
                <a href="audio-adjuster/index.html" class="tool-item" data-keywords="音频 音量 调整">
                    <span>音频调整器</span>
                </a>
                <a href="video-to-audio/index.html" class="tool-item" data-keywords="视频 音频 提取">
                    <span>视频转音频</span>
                </a>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>完全在浏览器中运行，您的数据不会上传至任何服务器</p>
    </footer>

    <script>
        const searchInput = document.getElementById('searchInput');
        const categories = document.querySelectorAll('.category');
        const toolItems = document.querySelectorAll('.tool-item');

        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase().trim();

            if (!keyword) {
                categories.forEach(cat => cat.style.display = 'block');
                toolItems.forEach(item => item.style.display = 'flex');
                return;
            }

            categories.forEach(cat => {
                const hasMatch = Array.from(cat.querySelectorAll('.tool-item')).some(item => {
                    const keywords = item.getAttribute('data-keywords').toLowerCase();
                    const name = item.querySelector('span').textContent.toLowerCase();
                    return keywords.includes(keyword) || name.includes(keyword);
                });
                cat.style.display = hasMatch ? 'block' : 'none';
            });

            toolItems.forEach(item => {
                const keywords = item.getAttribute('data-keywords').toLowerCase();
                const name = item.querySelector('span').textContent.toLowerCase();
                const match = keywords.includes(keyword) || name.includes(keyword);
                item.style.display = match ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
